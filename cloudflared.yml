# Cloudflare Tunnel Configuration for Sentinel
# 
# This file configures a Cloudflare Tunnel to expose your local Sentinel
# gateway to the internet securely — no open ports, no public IP needed.
#
# Prerequisites:
#   1. Install cloudflared: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/downloads/
#   2. Authenticate: cloudflared tunnel login
#   3. Create a tunnel: cloudflared tunnel create sentinel
#
# Usage:
#   cloudflared tunnel run sentinel
#   OR
#   sentinel deploy tunnel --port 8000

# Tunnel ID (replace with your tunnel ID from `cloudflared tunnel create`)
tunnel: sentinel-tunnel-id

# Credentials file (generated by cloudflared tunnel create)
credentials-file: /c/Users/rehan/.cloudflared/sentinel-tunnel-id.json

# Ingress rules — route traffic to local Sentinel services
ingress:
  # Sentinel Gateway API
  - hostname: sentinel.yourdomain.com
    service: http://localhost:8000
    originRequest:
      noTLSVerify: true
  
  # Sentinel Dashboard
  - hostname: dashboard.yourdomain.com
    service: http://localhost:8501
    originRequest:
      noTLSVerify: true
  
  # Catch-all (required)
  - service: http_status:404
